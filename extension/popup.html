<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; padding: 15px; font-family: sans-serif; background: #f8f9fa; }
    h3 { margin-top: 0; color: #333; font-size: 16px; margin-bottom: 12px; }
    .btn-container { display: flex; flex-direction: column; gap: 8px; }
    button { 
      width: 100%; 
      padding: 10px; 
      border: none; 
      cursor: pointer; 
      border-radius: 6px; 
      font-weight: bold;
      transition: all 0.2s;
    }
    #scanBtn { background: #28a745; color: white; }
    #scanBtn:hover { background: #218838; }
    
    #stopBtn { background: #dc3545; color: white; display: none; }
    #stopBtn:hover { background: #c82333; }

    #downloadBtn { background: #007bff; color: white; display: none; }
    #downloadBtn:hover { background: #0069d9; }
    
    #status { 
      margin: 12px 0 8px 0; 
      font-size: 13px; 
      color: #555; 
      text-align: center; 
      padding: 8px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-weight: bold;
    }

    #previewArea {
      height: 120px;
      background: #222;
      color: #0f0;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      overflow-y: auto;
      border-radius: 6px;
      margin-bottom: 12px;
      white-space: pre-wrap;
      display: none;
    }

    .settings-link { 
      display: block; 
      margin-top: 12px; 
      text-align: center; 
      font-size: 12px; 
      color: #666; 
      text-decoration: none; 
    }
    .settings-link:hover { color: #007bff; }
  </style>
</head>
<body>
  <h3>build-design</h3>
  <div id="status">Ready</div>
  <div id="previewArea"></div>
  
  <div class="btn-container">
    <button id="scanBtn">Start Scan</button>
    <button id="stopBtn">Stop Scanning</button>
    <button id="downloadBtn">Download DESIGN.md</button>
  </div>
  <a href="#" id="openOptions" class="settings-link">Open Dashboard</a>

  <script src="popup.js"></script>
</body>
</html>
