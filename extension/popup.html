<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #0d1117;
      --foreground: #ffffff;
      --primary: #E9F284;
      --secondary: #161b22;
      --border: rgba(233, 242, 132, 0.2);
    }
    body { 
      width: 320px; 
      padding: 20px; 
      font-family: 'Geist Mono', monospace; 
      background-color: var(--background); 
      color: var(--foreground);
      margin: 0;
      border: 1px solid var(--border);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    h3 { 
      margin: 0; 
      color: var(--primary); 
      font-size: 16px; 
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .btn-container { display: flex; flex-direction: column; gap: 10px; }
    button { 
      width: 100%; 
      padding: 12px; 
      border: none; 
      cursor: pointer; 
      border-radius: 0; 
      font-weight: 800;
      font-family: 'Geist Mono', monospace;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    #scanBtn { background: var(--primary); color: black; }
    #scanBtn:hover { filter: brightness(1.1); }
    #scanBtn:disabled { background: #333; color: #666; cursor: not-allowed; }
    
    #stopBtn { background: #ff4444; color: white; display: none; }
    #stopBtn:hover { background: #cc0000; }

    #downloadBtn { 
      background: transparent; 
      color: var(--primary); 
      border: 1px solid var(--primary);
      display: none; 
    }
    #downloadBtn:hover { background: rgba(233, 242, 132, 0.1); }
    
    #status { 
      margin-bottom: 15px;
      font-size: 11px; 
      color: var(--primary); 
      text-align: left; 
      padding: 8px;
      background: rgba(233, 242, 132, 0.05);
      border-left: 3px solid var(--primary);
      font-weight: 600;
      text-transform: uppercase;
    }

    #previewArea {
      height: 180px;
      background: #000;
      color: #E9F284;
      padding: 10px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      overflow-y: auto;
      border: 1px solid var(--border);
      margin-bottom: 15px;
      white-space: pre-wrap;
      display: none;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) transparent;
    }

    .footer {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings-link { 
      font-size: 10px; 
      color: rgba(255, 255, 255, 0.5); 
      text-decoration: none; 
      text-transform: uppercase;
      font-weight: 600;
    }
    .settings-link:hover { color: var(--primary); }

    .version {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
    }
    .model-info {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #activeModel {
      color: var(--primary);
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>BUILD DESIGN</h3>
    <div class="version">v2.0</div>
  </div>

  <div class="model-info">ACTIVE MODEL: <span id="activeModel">LOADING...</span></div>
  <div id="status">READY TO SCAN</div>
  <div id="previewArea"></div>
  
  <div class="btn-container">
    <button id="scanBtn">Execute Scan</button>
    <button id="stopBtn">Abort Process</button>
    <button id="downloadBtn">Get DESIGN.md</button>
  </div>

  <div class="footer">
    <a href="#" id="openOptions" class="settings-link">Configuration</a>
    <span style="color:rgba(255,255,255,0.2)">|</span>
    <a href="https://github.com/abib/build-design" target="_blank" class="settings-link">Docs</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
