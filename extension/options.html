<!DOCTYPE html>
<html>
<head>
  <title>build-design Settings</title>
  <style>
    body { font-family: sans-serif; padding: 20px; width: 400px; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background: #0056b3; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h2>build-design Dashboard</h2>
  
  <div class="field">
    <label for="provider">AI Provider</label>
    <select id="provider">
      <option value="nvidia">NVIDIA (Llama 3.1)</option>
      <option value="openai">OpenAI (GPT-4o)</option>
    </select>
  </div>

  <div class="field">
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
  </div>

  <div class="field">
    <label for="model">Model Name</label>
    <input type="text" id="model" placeholder="Enter model name (e.g. neutron)">
  </div>

  <button id="save">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
