<!DOCTYPE html>
<html>
<head>
  <title>build-design Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #0d1117;
      --foreground: #ffffff;
      --primary: #E9F284;
      --secondary: #161b22;
      --border: rgba(233, 242, 132, 0.2);
    }
    body { 
      font-family: 'Geist Mono', monospace; 
      background-color: var(--background);
      color: var(--foreground);
      padding: 30px; 
      width: 450px; 
      margin: 0 auto;
      line-height: 1.5;
    }
    h2 { 
      font-size: 24px; 
      font-weight: 800; 
      color: var(--primary); 
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: -1px;
      border-bottom: 2px solid var(--primary);
      display: inline-block;
      padding-bottom: 5px;
    }
    .field { margin-bottom: 20px; }
    label { 
      display: block; 
      margin-bottom: 8px; 
      font-weight: 600; 
      font-size: 12px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
    }
    input, select { 
      width: 100%; 
      padding: 12px; 
      box-sizing: border-box; 
      background: #1a1f26;
      border: 1px solid var(--border);
      color: white;
      font-family: 'Geist Mono', monospace;
      outline: none;
      transition: all 0.2s;
    }
    option {
      background: #1a1f26;
      color: white;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      background: #252b33;
    }
    button#save { 
      width: 100%;
      padding: 14px; 
      background: var(--primary); 
      color: black; 
      border: none; 
      cursor: pointer; 
      font-family: 'Geist Mono', monospace;
      font-weight: 900;
      text-transform: uppercase;
      margin-top: 10px;
      transition: transform 0.1s, filter 0.2s;
    }
    button#save:hover { 
      filter: brightness(1.1);
    }
    button#save:active {
      transform: scale(0.98);
    }
    #status { 
      margin-top: 15px; 
      color: var(--primary); 
      font-size: 11px;
      text-align: center;
      height: 18px;
      font-weight: bold;
    }
    .card {
      background: var(--secondary);
      padding: 20px;
      border: 1px solid var(--border);
    }
    .hint {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h2>Dashboard Settings</h2>
  
  <div class="card">
    <div class="field">
      <label for="provider">AI Provider</label>
      <select id="provider">
        <option value="nvidia">NVIDIA AI</option>
        <option value="google">Google Gemini</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="openai">OpenAI (GPT)</option>
        <option value="groq">Groq (Ultra Fast)</option>
        <option value="openrouter">OpenRouter (Any Model)</option>
      </select>
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your API key">
      <div class="hint">Your key is stored locally in your browser.</div>
    </div>

    <div class="field">
      <label for="modelSelect">Model Selection</label>
      <select id="modelSelect"></select>
      <input type="text" id="modelCustom" placeholder="Or enter custom model name" style="margin-top: 10px; display: none;">
      <div class="hint" id="modelHint">Models are updated in real-time for OpenRouter.</div>
    </div>

    <button id="save">Save Configuration</button>
    <div id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
